<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-400 -300 2400 1500" preserveAspectRatio="xMidYMid slice">
            <defs>
                <linearGradient id="aether-haze" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
                    <stop offset="0%" stop-color="#C89828" stop-opacity="0"/>
                    <stop offset="40%" stop-color="#C89828" stop-opacity="0.05"/>
                    <stop offset="100%" stop-color="#C89828" stop-opacity="0.15"/>
                </linearGradient>
                <!-- Island with holystone layer -->
                <linearGradient id="island-fill" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
                    <stop offset="0%" stop-color="#5AAA7C"/>
                    <stop offset="28%" stop-color="#4A9A6C"/>
                    <stop offset="34%" stop-color="#C8A860"/>
                    <stop offset="42%" stop-color="#8B7355"/>
                    <stop offset="65%" stop-color="#6B5540"/>
                    <stop offset="80%" stop-color="#B0AAB8"/>
                    <stop offset="100%" stop-color="#908898"/>
                </linearGradient>
                <linearGradient id="island-far" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
                    <stop offset="0%" stop-color="#6AAA80"/>
                    <stop offset="35%" stop-color="#8B7355"/>
                    <stop offset="70%" stop-color="#A8A0B0"/>
                    <stop offset="100%" stop-color="#908898"/>
                </linearGradient>
            </defs>

            <!-- Golden haze at horizon -->
            <rect x="0" y="550" width="1600" height="350" fill="url(#aether-haze)"/>

            <!-- ===== Aerclouds — blocky (low rx), scattered at multiple altitudes, VISIBLE ===== -->
            <!-- Blue aerclouds — lower altitude -->
            <rect x="250" y="280" width="70" height="14" rx="2" fill="#5888C8" opacity="0.4"/>
            <rect x="275" y="270" width="45" height="12" rx="2" fill="#6898D8" opacity="0.35"/>
            <rect x="560" y="420" width="55" height="12" rx="2" fill="#5080B8" opacity="0.32"/>
            <rect x="580" y="412" width="35" height="10" rx="2" fill="#6090C8" opacity="0.28"/>
            <!-- White/cold aerclouds -->
            <rect x="880" y="310" width="58" height="13" rx="2" fill="#D0D8E8" opacity="0.45"/>
            <rect x="900" y="302" width="38" height="10" rx="2" fill="#E0E8F0" opacity="0.4"/>
            <rect x="1100" y="450" width="65" height="14" rx="2" fill="#D8E0E8" opacity="0.38"/>
            <!-- Golden aerclouds — high altitude, rare -->
            <rect x="1320" y="190" width="55" height="12" rx="2" fill="#D4A838" opacity="0.3"/>
            <rect x="1340" y="182" width="35" height="9" rx="2" fill="#E0B840" opacity="0.25"/>
            <rect x="400" y="200" width="45" height="11" rx="2" fill="#C89828" opacity="0.25"/>

            <!-- ===== Large island — right, with golden oak + skyroot + Silver Dungeon ===== -->
            <g opacity="0.45">
                <path d="M1020,555 Q1060,510 1150,505 Q1250,500 1330,525 Q1370,540 1360,568 Q1340,600 1240,610 Q1130,608 1040,585 Z" fill="url(#island-fill)"/>
                <!-- Quicksoil shelf on edge -->
                <path d="M1340,555 Q1365,548 1370,540 Q1360,568 1340,575 Z" fill="#D8C878" opacity="0.5"/>

                <!-- Skyroot trees — lighter bark (#7A6A58) -->
                <line x1="1080" y1="520" x2="1080" y2="488" stroke="#7A6A58" stroke-width="3.5" stroke-linecap="round"/>
                <path d="M 1066.0,480.0 A 14.0,11.0 0 1,0 1094.0,480.0 A 14.0,11.0 0 1,0 1066.0,480.0 Z" fill="#4A8868" opacity="0.85"/>
                <path d="M 1070.0,478.0 A 10.0,8.0 0 1,0 1090.0,478.0 A 10.0,8.0 0 1,0 1070.0,478.0 Z" fill="#58A078" opacity="0.5"/>

                <line x1="1130" y1="512" x2="1130" y2="475" stroke="#7A6A58" stroke-width="4" stroke-linecap="round"/>
                <path d="M 1112.0,467.0 A 18.0,13.0 0 1,0 1148.0,467.0 A 18.0,13.0 0 1,0 1112.0,467.0 Z" fill="#3D7858" opacity="0.8"/>
                <path d="M 1117.0,465.0 A 13.0,10.0 0 1,0 1143.0,465.0 A 13.0,10.0 0 1,0 1117.0,465.0 Z" fill="#4D8868" opacity="0.5"/>

                <!-- Golden Oak — tall, magnificent golden crown with glow -->
                <circle cx="1210" cy="450" r="30" fill="#E0B840" opacity="0.08"/><!-- subtle glow -->
                <line x1="1210" y1="508" x2="1210" y2="462" stroke="#7A6A58" stroke-width="5" stroke-linecap="round"/>
                <path d="M 1186.0,450.0 A 24.0,18.0 0 1,0 1234.0,450.0 A 24.0,18.0 0 1,0 1186.0,450.0 Z" fill="#C89828" opacity="0.85"/>
                <path d="M 1192.0,447.0 A 18.0,14.0 0 1,0 1228.0,447.0 A 18.0,14.0 0 1,0 1192.0,447.0 Z" fill="#E0B840" opacity="0.7"/>
                <path d="M 1198.0,445.0 A 12.0,10.0 0 1,0 1222.0,445.0 A 12.0,10.0 0 1,0 1198.0,445.0 Z" fill="#F0D060" opacity="0.45"/>

                <!-- More skyroot -->
                <line x1="1280" y1="522" x2="1280" y2="498" stroke="#7A6A58" stroke-width="3" stroke-linecap="round"/>
                <path d="M 1268.0,492.0 A 12.0,9.0 0 1,0 1292.0,492.0 A 12.0,9.0 0 1,0 1268.0,492.0 Z" fill="#4A8868" opacity="0.75"/>

                <line x1="1310" y1="530" x2="1310" y2="510" stroke="#7A6A58" stroke-width="2.5" stroke-linecap="round"/>
                <path d="M 1301.0,505.0 A 9.0,7.0 0 1,0 1319.0,505.0 A 9.0,7.0 0 1,0 1301.0,505.0 Z" fill="#58A078" opacity="0.65"/>

                <!-- Silver Dungeon — greek temple silhouette -->
                <rect x="1160" y="508" width="35" height="16" rx="1" fill="#B0AAB8" opacity="0.45"/>
                <rect x="1155" y="505" width="45" height="5" rx="1" fill="#C0BAC8" opacity="0.4"/>
                <!-- Columns — slightly varied (weathered temple) -->
                <line x1="1163" y1="524" x2="1163" y2="512" stroke="#A8A2B0" stroke-width="2" opacity="0.35"/>
                <line x1="1175" y1="524" x2="1175" y2="510" stroke="#A8A2B0" stroke-width="2" opacity="0.4"/>
                <line x1="1187" y1="524" x2="1187" y2="511" stroke="#A8A2B0" stroke-width="2" opacity="0.35"/>

                <!-- Berry bushes — small colored dots on ground -->
                <circle cx="1100" cy="522" r="3" fill="#4A8868" opacity="0.5"/>
                <circle cx="1098" cy="520" r="1.5" fill="#D04040" opacity="0.4"/>
                <circle cx="1250" cy="527" r="3.5" fill="#4A8868" opacity="0.45"/>
                <circle cx="1248" cy="525" r="1.5" fill="#4040D0" opacity="0.35"/>
            </g>

            <!-- ===== Medium island — left, with skyroot trees ===== -->
            <g opacity="0.38">
                <path d="M100,635 Q130,590 210,585 Q290,582 340,605 Q365,620 355,645 Q330,670 220,674 Q120,668 100,650 Z" fill="url(#island-fill)"/>
                <!-- Quicksoil shelf -->
                <path d="M340,620 Q360,612 365,605 Q355,645 335,655 Z" fill="#D8C878" opacity="0.45"/>

                <line x1="155" y1="598" x2="155" y2="568" stroke="#7A6A58" stroke-width="3" stroke-linecap="round"/>
                <path d="M 142.0,561.0 A 13.0,10.0 0 1,0 168.0,561.0 A 13.0,10.0 0 1,0 142.0,561.0 Z" fill="#4A8868" opacity="0.85"/>

                <line x1="200" y1="592" x2="200" y2="555" stroke="#7A6A58" stroke-width="4" stroke-linecap="round"/>
                <path d="M 183.0,548.0 A 17.0,13.0 0 1,0 217.0,548.0 A 17.0,13.0 0 1,0 183.0,548.0 Z" fill="#408060" opacity="0.8"/>
                <path d="M 188.0,546.0 A 12.0,9.0 0 1,0 212.0,546.0 A 12.0,9.0 0 1,0 188.0,546.0 Z" fill="#50906A" opacity="0.5"/>

                <line x1="245" y1="590" x2="245" y2="565" stroke="#7A6A58" stroke-width="3" stroke-linecap="round"/>
                <path d="M 234.0,559.0 A 11.0,9.0 0 1,0 256.0,559.0 A 11.0,9.0 0 1,0 234.0,559.0 Z" fill="#4A8868" opacity="0.75"/>

                <line x1="285" y1="598" x2="285" y2="575" stroke="#7A6A58" stroke-width="2.5" stroke-linecap="round"/>
                <path d="M 276.0,570.0 A 9.0,7.0 0 1,0 294.0,570.0 A 9.0,7.0 0 1,0 276.0,570.0 Z" fill="#58A078" opacity="0.7"/>

                <!-- Aether flowers — tiny colored dots -->
                <circle cx="170" cy="598" r="2" fill="#E0E8F0" opacity="0.4"/>
                <circle cx="230" cy="594" r="2" fill="#B0B8F0" opacity="0.35"/>
                <circle cx="310" cy="605" r="1.5" fill="#E0D0F0" opacity="0.3"/>
            </g>

            <!-- ===== Medium island — center bottom ===== -->
            <g opacity="0.3">
                <path d="M680,685 Q710,655 775,648 Q845,645 890,662 Q910,675 900,695 Q875,718 785,722 Q700,718 685,700 Z" fill="url(#island-fill)"/>
                <line x1="730" y1="660" x2="730" y2="635" stroke="#7A6A58" stroke-width="3" stroke-linecap="round"/>
                <path d="M 718.0,628.0 A 12.0,10.0 0 1,0 742.0,628.0 A 12.0,10.0 0 1,0 718.0,628.0 Z" fill="#4A8868" opacity="0.8"/>
                <line x1="780" y1="654" x2="780" y2="622" stroke="#7A6A58" stroke-width="3.5" stroke-linecap="round"/>
                <path d="M 765.0,615.0 A 15.0,11.0 0 1,0 795.0,615.0 A 15.0,11.0 0 1,0 765.0,615.0 Z" fill="#408060" opacity="0.75"/>
                <!-- Skyroot (not golden oak — golden oaks are RARE) -->
                <line x1="835" y1="658" x2="835" y2="638" stroke="#7A6A58" stroke-width="3" stroke-linecap="round"/>
                <path d="M 823.0,632.0 A 12.0,9.0 0 1,0 847.0,632.0 A 12.0,9.0 0 1,0 823.0,632.0 Z" fill="#4A8868" opacity="0.7"/>
                <path d="M 826.0,630.0 A 9.0,7.0 0 1,0 844.0,630.0 A 9.0,7.0 0 1,0 826.0,630.0 Z" fill="#58A078" opacity="0.45"/>
            </g>

            <!-- ===== Small distant islands ===== -->
            <g opacity="0.22">
                <path d="M 410.0,400.0 A 60.0,18.0 0 1,0 530.0,400.0 A 60.0,18.0 0 1,0 410.0,400.0 Z" fill="url(#island-far)"/>
                <line x1="455" y1="384" x2="455" y2="368" stroke="#7A6A58" stroke-width="2" stroke-linecap="round"/>
                <path d="M 447.0,363.0 A 8.0,6.0 0 1,0 463.0,363.0 A 8.0,6.0 0 1,0 447.0,363.0 Z" fill="#4A8868" opacity="0.7"/>
                <line x1="480" y1="383" x2="480" y2="370" stroke="#7A6A58" stroke-width="2.5" stroke-linecap="round"/>
                <path d="M 470.0,365.0 A 10.0,7.0 0 1,0 490.0,365.0 A 10.0,7.0 0 1,0 470.0,365.0 Z" fill="#408060" opacity="0.65"/>
            </g>

            <!-- Tiny distant island -->
            <path d="M 1392.0,360.0 A 38.0,11.0 0 1,0 1468.0,360.0 A 38.0,11.0 0 1,0 1392.0,360.0 Z" fill="url(#island-far)" opacity="0.14"/>
            <line x1="1425" y1="350" x2="1425" y2="340" stroke="#7A6A58" stroke-width="1.5" opacity="0.12"/>
            <path d="M 1420.0,337.0 A 5.0,4.0 0 1,0 1430.0,337.0 A 5.0,4.0 0 1,0 1420.0,337.0 Z" fill="#4A8868" opacity="0.12"/>

            <!-- Gold Dungeon — SPHERICAL island with golden oaks, far away -->
            <g opacity="0.2">
                <!-- Spherical shape — main ball + smaller attached -->
                <circle cx="200" cy="380" r="28" fill="url(#island-far)"/>
                <circle cx="180" cy="395" r="12" fill="url(#island-far)" opacity="0.7"/>
                <circle cx="222" cy="390" r="10" fill="url(#island-far)" opacity="0.6"/>
                <!-- Golden oaks on top — key identifier -->
                <line x1="190" y1="355" x2="190" y2="340" stroke="#7A6A58" stroke-width="2" stroke-linecap="round"/>
                <path d="M 180.0,334.0 A 10.0,8.0 0 1,0 200.0,334.0 A 10.0,8.0 0 1,0 180.0,334.0 Z" fill="#DAA520" opacity="0.7"/>
                <path d="M 183.0,332.0 A 7.0,6.0 0 1,0 197.0,332.0 A 7.0,6.0 0 1,0 183.0,332.0 Z" fill="#FFD700" opacity="0.5"/>
                <line x1="210" y1="356" x2="210" y2="344" stroke="#7A6A58" stroke-width="2" stroke-linecap="round"/>
                <path d="M 202.0,339.0 A 8.0,6.0 0 1,0 218.0,339.0 A 8.0,6.0 0 1,0 202.0,339.0 Z" fill="#DAA520" opacity="0.6"/>
                <!-- Entrance hole visible on sphere -->
                <path d="M 211.0,378.0 A 4.0,3.0 0 1,0 219.0,378.0 A 4.0,3.0 0 1,0 211.0,378.0 Z" fill="#3A3025" opacity="0.4"/>
            </g>

            <!-- ===== Aercloud blankets UNDER islands ===== -->
            <!-- Under large right island -->
            <path d="M 1080.0,620.0 A 120.0,12.0 0 1,0 1320.0,620.0 A 120.0,12.0 0 1,0 1080.0,620.0 Z" fill="#FFFFFF" opacity="0.15"/>
            <path d="M 1090.0,628.0 A 90.0,10.0 0 1,0 1270.0,628.0 A 90.0,10.0 0 1,0 1090.0,628.0 Z" fill="#FFFFFF" opacity="0.12"/>
            <!-- Under left island -->
            <path d="M 120.0,685.0 A 100.0,10.0 0 1,0 320.0,685.0 A 100.0,10.0 0 1,0 120.0,685.0 Z" fill="#FFFFFF" opacity="0.13"/>
            <path d="M 170.0,692.0 A 70.0,8.0 0 1,0 310.0,692.0 A 70.0,8.0 0 1,0 170.0,692.0 Z" fill="#FFFFFF" opacity="0.1"/>
            <!-- Under center island -->
            <path d="M 705.0,730.0 A 85.0,9.0 0 1,0 875.0,730.0 A 85.0,9.0 0 1,0 705.0,730.0 Z" fill="#FFFFFF" opacity="0.12"/>
            <!-- Scattered aercloud blankets between islands -->
            <path d="M 440.0,550.0 A 60.0,8.0 0 1,0 560.0,550.0 A 60.0,8.0 0 1,0 440.0,550.0 Z" fill="#FFFFFF" opacity="0.1"/>
            <path d="M 945.0,500.0 A 55.0,7.0 0 1,0 1055.0,500.0 A 55.0,7.0 0 1,0 945.0,500.0 Z" fill="#FFFFFF" opacity="0.08"/>

            <!-- ===== Moa birds flying ===== -->
            <!-- Blue moa — closer, bright blue -->
            <g opacity="0.25" transform="translate(380,290)">
                <path d="M0,0 Q3,-5 8,-8 Q13,-6 16,-2 Q20,-8 25,-5 Q22,0 18,2 Q13,4 8,2 Q3,3 0,0 Z" fill="#60A8D8"/>
                <circle cx="26" cy="-4" r="1.5" fill="#4890C0"/>
                <!-- Tail feathers -->
                <path d="M-1,1 Q-5,4 -8,2" stroke="#60A8D8" stroke-width="1" fill="none" opacity="0.6"/>
            </g>
            <!-- Orange moa — farther -->
            <g opacity="0.18" transform="translate(1080,260)">
                <path d="M0,0 Q2,-4 6,-6 Q10,-4 12,-1 Q15,-6 18,-4 Q16,0 13,1 Q10,3 6,1 Q2,2 0,0 Z" fill="#D89030"/>
                <circle cx="19" cy="-3" r="1" fill="#C08020"/>
            </g>
            <!-- Phyg (flying pig with wings) -->
            <g opacity="0.15" transform="translate(700,320)">
                <path d="M -6.0,0.0 A 6.0,4.0 0 1,0 6.0,0.0 A 6.0,4.0 0 1,0 -6.0,0.0 Z" fill="#E0A8A8"/>
                <!-- Wings -->
                <path d="M-3,-2 Q-10,-9 -6,-12 Q-2,-7 0,-3 Z" fill="#E8C0C0" opacity="0.7"/>
                <path d="M3,-2 Q10,-9 6,-12 Q2,-7 0,-3 Z" fill="#E8C0C0" opacity="0.7"/>
                <!-- Snout -->
                <path d="M 4.0,0.5 A 2.0,1.5 0 1,0 8.0,0.5 A 2.0,1.5 0 1,0 4.0,0.5 Z" fill="#D89898"/>
            </g>

            <!-- Zephyr — rectangular cuboid cloud mob (ghast-like) -->
            <g opacity="0.18" transform="translate(1250,370)">
                <!-- Main body — rectangular, not round -->
                <rect x="-14" y="-10" width="28" height="20" rx="3" fill="#D0D8E8"/>
                <!-- Cloud puff on top -->
                <path d="M -10.0,-12.0 A 10.0,5.0 0 1,0 10.0,-12.0 A 10.0,5.0 0 1,0 -10.0,-12.0 Z" fill="#E0E8F0"/>
                <!-- Face — small dark eyes, open mouth (like ghast) -->
                <circle cx="-5" cy="-2" r="1.5" fill="#6080A0" opacity="0.6"/>
                <circle cx="5" cy="-2" r="1.5" fill="#6080A0" opacity="0.6"/>
                <path d="M -3.0,3.0 A 3.0,2.0 0 1,0 3.0,3.0 A 3.0,2.0 0 1,0 -3.0,3.0 Z" fill="#6080A0" opacity="0.3"/>
                <!-- Tentacle-like trails below — longer, iconic -->
                <line x1="-8" y1="10" x2="-8" y2="25" stroke="#D0D8E8" stroke-width="1.5" opacity="0.5"/>
                <line x1="0" y1="10" x2="0" y2="28" stroke="#D0D8E8" stroke-width="1.5" opacity="0.45"/>
                <line x1="8" y1="10" x2="8" y2="23" stroke="#D0D8E8" stroke-width="1.5" opacity="0.4"/>
            </g>

            <!-- Sheepuff — puffy balloon sheep floating -->
            <g opacity="0.16" transform="translate(550,350)">
                <!-- Puffy wool body — round like balloon -->
                <path d="M -10.0,0.0 A 10.0,9.0 0 1,0 10.0,0.0 A 10.0,9.0 0 1,0 -10.0,0.0 Z" fill="#E8F0F8"/>
                <path d="M -9.0,-3.0 A 6.0,5.0 0 1,0 3.0,-3.0 A 6.0,5.0 0 1,0 -9.0,-3.0 Z" fill="#F0F4F8" opacity="0.7"/>
                <!-- Head -->
                <path d="M 6.0,2.0 A 4.0,3.5 0 1,0 14.0,2.0 A 4.0,3.5 0 1,0 6.0,2.0 Z" fill="#C8C0C0"/>
                <!-- Eyes -->
                <circle cx="12" cy="1" r="0.8" fill="#404040" opacity="0.5"/>
                <!-- Tiny legs dangling -->
                <line x1="-4" y1="8" x2="-4" y2="13" stroke="#C8C0C0" stroke-width="1.5" opacity="0.4"/>
                <line x1="4" y1="8" x2="4" y2="13" stroke="#C8C0C0" stroke-width="1.5" opacity="0.4"/>
            </g>
</svg>
