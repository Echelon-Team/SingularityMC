<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-300 -250 2200 1400" preserveAspectRatio="xMidYMid meet">
            <defs>
                <linearGradient id="end-fog" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#2F195F" stop-opacity="0"/>
                    <stop offset="30%" stop-color="#2F195F" stop-opacity="0.12"/>
                    <stop offset="70%" stop-color="#2F195F" stop-opacity="0.35"/>
                    <stop offset="100%" stop-color="#1B1028" stop-opacity="0.55"/>
                </linearGradient>
                <linearGradient id="endstone" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#DDDFA5"/>
                    <stop offset="42%" stop-color="#D0D298"/>
                    <stop offset="52%" stop-color="#3A2068"/>
                    <stop offset="100%" stop-color="#1B1028"/>
                </linearGradient>
                <linearGradient id="endstone-far" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#B8BA85"/>
                    <stop offset="40%" stop-color="#2A1650"/>
                    <stop offset="100%" stop-color="#14121D"/>
                </linearGradient>
                <!-- End crystal: magenta/pink core, NOT gold -->
                <radialGradient id="crystal-glow">
                    <stop offset="0%" stop-color="#FF66AA" stop-opacity="0.95"/>
                    <stop offset="30%" stop-color="#E060A0" stop-opacity="0.6"/>
                    <stop offset="60%" stop-color="#DA73DE" stop-opacity="0.3"/>
                    <stop offset="100%" stop-color="#DA73DE" stop-opacity="0"/>
                </radialGradient>
                <!-- Pillar obsidian gradient -->
                <linearGradient id="obsidian" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#1A0F2B"/>
                    <stop offset="50%" stop-color="#120A20"/>
                    <stop offset="100%" stop-color="#0A0614"/>
                </linearGradient>
                <!-- Dragon beam -->
                <linearGradient id="dragon-breath" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#A040C0" stop-opacity="0.3"/>
                    <stop offset="100%" stop-color="#DA73DE" stop-opacity="0"/>
                </linearGradient>
            </defs>

            <!-- Purple atmospheric fog — denser at bottom -->
            <rect x="0" y="400" width="1600" height="500" fill="url(#end-fog)"/>

            <!-- ===== MAIN ISLAND with pillar circle ===== -->
            <g opacity="0.55">
                <!-- Central platform — large, flat endstone -->
                <ellipse cx="820" cy="680" rx="200" ry="50" fill="url(#endstone)"/>

                <!-- Obsidian pillars — on island surface -->
                <!-- Back row (farther, shorter) -->
                <rect x="720" y="533" width="12" height="120" fill="url(#obsidian)"/>
                <circle cx="726" cy="529" r="6" fill="url(#crystal-glow)"/>
                <rect x="780" y="513" width="13" height="140" fill="url(#obsidian)"/>
                <circle cx="786" cy="509" r="7" fill="url(#crystal-glow)"/>
                <rect x="845" y="503" width="14" height="150" fill="url(#obsidian)"/>
                <circle cx="852" cy="499" r="7.5" fill="url(#crystal-glow)"/>
                <rect x="910" y="518" width="13" height="135" fill="url(#obsidian)"/>
                <circle cx="916" cy="514" r="6.5" fill="url(#crystal-glow)"/>

                <!-- Front row (closer, taller) -->
                <rect x="690" y="488" width="15" height="165" fill="url(#obsidian)"/>
                <circle cx="697" cy="483" r="8" fill="url(#crystal-glow)"/>
                <rect x="755" y="458" width="16" height="195" fill="url(#obsidian)"/>
                <circle cx="763" cy="453" r="9" fill="url(#crystal-glow)"/>
                <!-- Tallest pillar -->
                <rect x="830" y="428" width="16" height="225" fill="url(#obsidian)"/>
                <circle cx="838" cy="423" r="10" fill="url(#crystal-glow)"/>
                <rect x="895" y="468" width="15" height="185" fill="url(#obsidian)"/>
                <circle cx="902" cy="463" r="8.5" fill="url(#crystal-glow)"/>
                <rect x="950" y="508" width="14" height="145" fill="url(#obsidian)"/>
                <circle cx="957" cy="504" r="7" fill="url(#crystal-glow)"/>

            </g>

            <!-- Dragon removed — SVG not the right tool for this -->

            <!-- ===== OUTER ISLAND — left, chorus forest ===== -->
            <g opacity="0.32">
                <path d="M140,620 Q160,590 220,588 Q290,585 330,600 Q350,612 340,635 Q310,660 230,662 Q150,658 140,640 Z" fill="url(#endstone)"/>
                <!-- Dense chorus forest -->
                <line x1="175" y1="595" x2="175" y2="568" stroke="#6A3870" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="175" y1="578" x2="165" y2="570" stroke="#603468" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="175" cy="565" r="4.5" fill="#B868C0" opacity="0.8"/>
                <circle cx="164" cy="568" r="3" fill="#A860B0" opacity="0.7"/>

                <line x1="205" y1="592" x2="205" y2="560" stroke="#5A2860" stroke-width="3" stroke-linecap="round"/>
                <line x1="205" y1="572" x2="195" y2="563" stroke="#6A3870" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="205" y1="575" x2="218" y2="567" stroke="#603468" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="205" cy="557" r="5.5" fill="#A860B0" opacity="0.8"/>
                <circle cx="194" cy="561" r="3.5" fill="#C070C8" opacity="0.7"/>
                <circle cx="219" cy="564" r="3" fill="#B060A8" opacity="0.65"/>

                <line x1="240" y1="590" x2="240" y2="570" stroke="#724078" stroke-width="2.5" stroke-linecap="round"/>
                <circle cx="240" cy="567" r="4" fill="#C070C8" opacity="0.75"/>

                <line x1="270" y1="593" x2="270" y2="565" stroke="#603468" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="270" y1="578" x2="280" y2="570" stroke="#6A3870" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="270" cy="562" r="5" fill="#B868C0" opacity="0.75"/>
                <circle cx="281" cy="568" r="3" fill="#A860B0" opacity="0.6"/>

                <line x1="300" y1="597" x2="300" y2="580" stroke="#5A2860" stroke-width="2" stroke-linecap="round"/>
                <circle cx="300" cy="577" r="3.5" fill="#B060A8" opacity="0.7"/>
            </g>

            <!-- ===== OUTER ISLAND — right, with End City ===== -->
            <g opacity="0.45">
                <path d="M1150,570 Q1180,540 1250,535 Q1330,530 1380,550 Q1400,562 1390,580 Q1370,605 1270,610 Q1180,607 1155,590 Z" fill="url(#endstone)"/>

                <!-- End City — towers STARTING ON island surface, not edge -->
                <!-- Main tower — base at y=540 (island surface), NOT opaque -->
                <rect x="1280" y="440" width="20" height="100" rx="1" fill="#8C60A0"/>
                <rect x="1274" y="435" width="32" height="8" rx="1" fill="#9A70B0"/>
                <rect x="1277" y="428" width="26" height="10" rx="1" fill="#A880B8"/>
                <!-- Stepped platforms on tower -->
                <rect x="1268" y="470" width="14" height="6" fill="#9A70B0"/>
                <rect x="1298" y="480" width="14" height="6" fill="#9A70B0"/>
                <rect x="1264" y="510" width="12" height="5" fill="#8C60A0"/>
                <!-- Second tower — also solid, starts on island -->
                <rect x="1310" y="475" width="14" height="65" rx="1" fill="#7C5090"/>
                <rect x="1306" y="471" width="22" height="7" rx="1" fill="#8C60A0"/>
                <!-- End rod glows on towers -->
                <circle cx="1290" cy="432" r="3.5" fill="#DA73DE" opacity="0.7"/>
                <circle cx="1317" cy="473" r="3" fill="#DA73DE" opacity="0.6"/>
                <!-- End ship silhouette nearby -->
                <g opacity="0.5" transform="translate(1340,510)">
                    <path d="M0,0 Q8,-12 20,-10 Q35,-8 40,0 Q35,5 20,6 Q5,5 0,0 Z" fill="#6C4080"/>
                    <line x1="20" y1="-10" x2="20" y2="-22" stroke="#5C3070" stroke-width="2"/>
                    <rect x="16" y="-22" width="8" height="8" rx="1" fill="#7C5090" opacity="0.5"/>
                </g>

                <!-- Chorus trees on this island too -->
                <line x1="1185" y1="545" x2="1185" y2="520" stroke="#6A3870" stroke-width="2.5" stroke-linecap="round"/>
                <circle cx="1185" cy="517" r="4.5" fill="#B868C0" opacity="0.75"/>
                <line x1="1210" y1="542" x2="1210" y2="515" stroke="#603468" stroke-width="3" stroke-linecap="round"/>
                <line x1="1210" y1="525" x2="1220" y2="518" stroke="#6A3870" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="1210" cy="512" r="5" fill="#A860B0" opacity="0.8"/>
                <circle cx="1221" cy="516" r="3" fill="#C070C8" opacity="0.6"/>
                <line x1="1240" y1="540" x2="1240" y2="525" stroke="#724078" stroke-width="2" stroke-linecap="round"/>
                <circle cx="1240" cy="522" r="3.5" fill="#B060A8" opacity="0.7"/>
            </g>

            <!-- ===== Distant islands ===== -->
            <ellipse cx="480" cy="490" rx="65" ry="18" fill="url(#endstone-far)" opacity="0.22"/>
            <line x1="470" y1="474" x2="470" y2="462" stroke="#8040A0" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
            <circle cx="470" cy="460" r="2.5" fill="#A060B0" opacity="0.18"/>
            <line x1="490" y1="475" x2="490" y2="466" stroke="#9050A0" stroke-width="1" stroke-linecap="round" opacity="0.18"/>
            <circle cx="490" cy="464" r="2" fill="#B870C0" opacity="0.15"/>

            <g opacity="0.15">
                <ellipse cx="1450" cy="460" rx="50" ry="14" fill="url(#endstone-far)"/>
                <line x1="1440" y1="448" x2="1440" y2="438" stroke="#603468" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="1440" cy="436" r="2.5" fill="#B868C0" opacity="0.7"/>
                <line x1="1460" y1="449" x2="1460" y2="441" stroke="#5A2860" stroke-width="1" stroke-linecap="round"/>
                <circle cx="1460" cy="439" r="2" fill="#A860B0" opacity="0.6"/>
            </g>

            <!-- Medium-far island with sparse chorus -->
            <g opacity="0.2">
                <ellipse cx="600" cy="560" rx="75" ry="22" fill="url(#endstone-far)"/>
                <line x1="580" y1="540" x2="580" y2="525" stroke="#8040A0" stroke-width="2" stroke-linecap="round"/>
                <circle cx="580" cy="522" r="3.5" fill="#A060B0" opacity="0.7"/>
                <line x1="610" y1="542" x2="610" y2="530" stroke="#9050A8" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="610" cy="528" r="2.5" fill="#B870C8" opacity="0.6"/>
                <line x1="625" y1="543" x2="625" y2="533" stroke="#8848A0" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="625" cy="531" r="2" fill="#A868B8" opacity="0.5"/>
            </g>

            <!-- (standalone pillar removed — looked silly alone in void) -->

            <!-- End particles scattered — purple sparkles -->
            <circle cx="300" cy="500" r="1.5" fill="#DA73DE" opacity="0.2"/>
            <circle cx="700" cy="450" r="1" fill="#A860B0" opacity="0.15"/>
            <circle cx="1100" cy="480" r="1.5" fill="#B868C0" opacity="0.18"/>
            <circle cx="500" cy="600" r="1" fill="#DA73DE" opacity="0.12"/>
            <circle cx="1300" cy="550" r="1.5" fill="#A050B0" opacity="0.15"/>
            <circle cx="900" cy="420" r="1" fill="#DA73DE" opacity="0.1"/>
        </svg>
