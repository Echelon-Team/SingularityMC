name: Release Build

# Dwa formaty tagów uruchamiają ten workflow:
#   v1.2.3      — stabilny release
#   v1.2.3-rc.1 — prerelease (oznaczane `IS_PRERELEASE=true` poniżej,
#                 GitHub Release dostaje prerelease: true)
#
# ci.yml (osobny workflow) nadal obsługuje push/PR builds bez tagów.
on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*.*'

permissions:
  contents: write # softprops/action-gh-release musi móc tworzyć Release

env:
  # Kotlin CLI version for `scripts/generate-manifest.main.kts`. Bump
  # tylko gdy zmieniasz target language features w script — inaczej
  # pinowane stałe dla reprodukcyjności CI.
  KOTLIN_VERSION: "2.0.21"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os_suffix: windows
            exe_ext: .exe
            auto_update_bin: singularitymc-auto-update.exe
          - os: ubuntu-latest
            os_suffix: linux
            exe_ext: ''
            auto_update_bin: singularitymc-auto-update
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth 0 — build.rs w auto-update używa `git describe`
          # żeby osadzić wersję w binarce. Shallow clone = "No names found".
          fetch-depth: 0

      - name: Extract version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          if [[ "$TAG" == *"-"* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
          fi

      # JDK 17 (NIE 21 jak ci.yml) — jpackage bundled JRE z 17 jest
      # mniejszy + stabilniejszy zgodnie z decyzją w build.gradle.kts.
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # Kotlin CLI — manual install z JetBrains release zip. Unified
      # dla Win + Linux (GHA Windows runner ma bash + unzip via Git
      # Bash). Cache'owane żeby nie pobierać za każdym runem.
      - name: Cache Kotlin CLI
        id: kotlin-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.tool_cache }}/kotlin-${{ env.KOTLIN_VERSION }}
          key: kotlin-${{ runner.os }}-${{ env.KOTLIN_VERSION }}

      - name: Install Kotlin CLI
        if: steps.kotlin-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p "$RUNNER_TOOL_CACHE/kotlin-$KOTLIN_VERSION"
          cd "$RUNNER_TOOL_CACHE/kotlin-$KOTLIN_VERSION"
          curl -sL "https://github.com/JetBrains/kotlin/releases/download/v${KOTLIN_VERSION}/kotlin-compiler-${KOTLIN_VERSION}.zip" -o kotlin.zip
          unzip -q kotlin.zip

      - name: Add Kotlin to PATH
        shell: bash
        run: echo "$RUNNER_TOOL_CACHE/kotlin-$KOTLIN_VERSION/kotlinc/bin" >> "$GITHUB_PATH"

      # Installer tooling per OS.
      - name: Install Inno Setup (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install AppImage tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        # appimagetool pochodzi z `AppImage/appimagetool` repo — stare
        # `AppImage/AppImageKit/releases/continuous` było oznaczone
        # "obsolete" w 2023 i nie jest już aktywnie rebuildowane;
        # docelowo tag disappear i wget 404. Bieżący repo/tag działa
        # i dostaje regularne updates (last publish 2025-12).
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ matrix.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            auto-update/target
          key: cargo-${{ matrix.os }}-${{ hashFiles('auto-update/Cargo.toml', 'auto-update/Cargo.lock') }}

      # Exec bits — git z Windows checkout nie przechowuje Unix exec
      # bit, więc ./gradlew + bash scripts są `Permission denied` na
      # ubuntu-latest. `chmod +x` idempotentne, tania operacja.
      - name: Restore exec bits on Unix scripts
        shell: bash
        run: |
          chmod +x gradlew
          chmod +x scripts/*.sh || true  # katalog może nie mieć .sh, nie fail

      - name: Build launcher (createDistributable)
        shell: bash
        run: ./gradlew :singularity-launcher:createDistributable

      - name: Build auto-update (release)
        working-directory: auto-update
        run: cargo build --release

      # Task 7: pack launcher + runtime w 2 tarballe per OS (deterministic
      # tar flags — identyczne source = identyczny sha256). Zastępuje
      # legacy per-file copy z OS prefix convention.
      - name: Pack launcher + JRE tarballs
        shell: bash
        run: |
          mkdir -p release
          chmod +x scripts/copy-release-files.sh
          bash scripts/copy-release-files.sh \
              singularity-launcher/build/compose/binaries/main/app/SingularityMC \
              release \
              ${{ matrix.os_suffix }}

      # Copy auto-update binary pod canonical nazwę (asset naming immutable
      # — patrz project_release_asset_naming_immutable memory rule).
      # `auto_update_bin` matrix var = `singularitymc-auto-update.exe`
      # (Windows) / `singularitymc-auto-update` (Linux) — renaming na
      # `auto-update-<os>[.exe]` matching manifest URL pattern.
      - name: Copy auto-update binary (canonical name)
        shell: bash
        run: |
          SRC="auto-update/target/release/${{ matrix.auto_update_bin }}"
          DEST="release/auto-update-${{ matrix.os_suffix }}${{ matrix.exe_ext }}"
          cp "$SRC" "$DEST"
          ls -lh "$DEST"

      # Read auto-update/Cargo.toml [package].version — needed jako arg
      # dla generate-manifest (AutoUpdatePackage.version field).
      # grep + sed wystarczy (Cargo.toml format stabilny + feedback rule
      # wymusza manual bump więc string parsing OK).
      - name: Read auto-update Cargo version
        shell: bash
        run: |
          VERSION_AU=$(grep '^version' auto-update/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "AUTO_UPDATE_VERSION=$VERSION_AU" >> "$GITHUB_ENV"
          echo "auto-update Cargo.toml version: $VERSION_AU"

      # Task 6: generate manifest-<os>.json z new 7-arg signature.
      # sha256 + size per bundle liczone streaming z already-packed
      # tarballi (i auto-update binary).
      - name: Generate manifest
        shell: bash
        run: |
          kotlin scripts/generate-manifest.main.kts \
              release/launcher-${{ matrix.os_suffix }}.tar.gz \
              release/jre-${{ matrix.os_suffix }}.tar.gz \
              release/auto-update-${{ matrix.os_suffix }}${{ matrix.exe_ext }} \
              ${{ matrix.os_suffix }} \
              ${{ env.VERSION }} \
              ${{ env.AUTO_UPDATE_VERSION }} \
              release/manifest-${{ matrix.os_suffix }}.json
          cat release/manifest-${{ matrix.os_suffix }}.json

      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        shell: bash
        run: iscc installer/singularitymc.iss //DVERSION=${{ env.VERSION }}

      - name: Build Linux AppImage
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/build-appimage.sh ${{ env.VERSION }}

      # Upload: tylko ~5 assetów per OS (było ~250). Release job downloaduje
      # i bezpośrednio wrzuca do GitHub Release — bez ponownego copy-release-files
      # (tamto było legacy per-file convention).
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os_suffix }}
          path: |
            release/launcher-${{ matrix.os_suffix }}.tar.gz
            release/jre-${{ matrix.os_suffix }}.tar.gz
            release/auto-update-${{ matrix.os_suffix }}${{ matrix.exe_ext }}
            release/manifest-${{ matrix.os_suffix }}.json
            installer/SingularityMC-Setup-*.exe
            installer/SingularityMC-*.AppImage
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "VERSION=${TAG#v}" >> $GITHUB_ENV
          if [[ "$TAG" == *"-"* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        shell: bash
        # set -e + explicit guards — żaden krok nie swallowa failure.
        # Nowy 3-package model: ~5 assetów per OS (było ~250 per-file).
        # Matrix build step już pack'uje i nazywa assety canonicznie —
        # release job tylko kopiuje z artifacts/ do release/.
        run: |
          set -euo pipefail
          mkdir -p release/

          # Per-OS bundles (tarballe + auto-update binary + manifest).
          # Każdy z matrix build step. Canonical naming IMMUTABLE —
          # hardcoded w installer Pascal + AppRun shell.
          for OS in windows linux; do
              for ASSET in launcher-$OS.tar.gz jre-$OS.tar.gz manifest-$OS.json; do
                  SRC="artifacts/build-$OS/$ASSET"
                  if [ ! -f "$SRC" ]; then
                      echo "::error::missing $SRC — upstream build-$OS job failed" >&2
                      exit 1
                  fi
                  cp "$SRC" release/
              done
          done

          # Auto-update binaries (per-OS rename już done w matrix).
          if [ ! -f artifacts/build-windows/auto-update-windows.exe ]; then
              echo "::error::missing auto-update-windows.exe" >&2
              exit 1
          fi
          cp artifacts/build-windows/auto-update-windows.exe release/
          if [ ! -f artifacts/build-linux/auto-update-linux ]; then
              echo "::error::missing auto-update-linux" >&2
              exit 1
          fi
          cp artifacts/build-linux/auto-update-linux release/

          # Installer (Windows) + AppImage (Linux) — user-facing entry points.
          # Patrz project_installer_hash_stability memory rule — installer
          # hash MUSI być stały. Task 10 + Task 11 czynią installer universal
          # (bez wersji w nazwie). Do tego czasu release ma wersjonowaną
          # nazwę (tymczasowe, zmienia się w Task 10).
          if ! ls artifacts/build-windows/SingularityMC-Setup-*.exe >/dev/null 2>&1; then
              echo "::error::Windows installer artifact missing — iscc failed upstream" >&2
              exit 1
          fi
          cp artifacts/build-windows/SingularityMC-Setup-*.exe release/
          if ! ls artifacts/build-linux/SingularityMC-*.AppImage >/dev/null 2>&1; then
              echo "::error::Linux AppImage artifact missing — build-appimage.sh failed upstream" >&2
              exit 1
          fi
          cp artifacts/build-linux/SingularityMC-*.AppImage release/

          echo "--- Release assets ($(ls release/ | wc -l) files) ---"
          ls -lah release/
          echo "--- Total ---"
          du -sh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          prerelease: ${{ env.IS_PRERELEASE }}
          # Tag name automatycznie z GITHUB_REF, name (tytuł release)
          # taki sam. Release body pozostaje puste — Mateusz dopisuje
          # changelog post-tworzeniu (lub automatyzacja w przyszłej
          # iteracji via `generate_release_notes: true`).
